  - name: currency
    type: currency
    required: true
    db_column: currency
    canonical_labels:
      - "Currency"
      - "CCY"
      - "Invoice Currency"
      - "Billing Currency"
    confidence_threshold: 0.55
    patterns:
      - name: anchored_currency_iso
        anchor: '(?i)\b(?:currency|ccy)\s*[:\-]\s*'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.92
      - name: iso_in_text
        anchor: '(?:^|\n|\s)'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.70
      - name: pound_symbol
        anchor: '(?:^|\s)'
        value: '(£)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: euro_symbol
        anchor: '(?:^|\s)'
        value: '(€)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: dollar_symbol
        anchor: '(?:^|\s)'
        value: '(\$)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.58
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: total_amount
    type: money
    required: true
    db_column: total_amount
    canonical_labels:
      - "Total Amount"
      - "Grand Total"
      - "Order Total"
      - "PO Total"
      - "Total Value"
      - "Net Total"
      - "Amount"
      - "Sub Total"
      - "Subtotal"
    confidence_threshold: 0.65
    patterns:
      - name: grand_total
        anchor: '(?i)\bgrand[\s\-]+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.92
      - name: po_or_order_total
        anchor: '(?i)\b(?:po\s+total|order\s+total|total\s+value|total\s+amount)\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.88
      - name: subtotal_net
        anchor: '(?i)\b(?:sub\s*-?\s*total|net\s+total|net\s+amount)\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      - name: bare_total_currency
        anchor: '(?i)(?<!grand\s)(?<!sub\s)(?<!\bsub-)\btotal\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.78
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

