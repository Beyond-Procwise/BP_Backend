  - name: order_date
    type: iso_date
    required: false
    db_column: order_date
    canonical_labels:
      - "Order Date"
      - "PO Date"
      - "Issue Date"
      - "Date Issued"
      - "Date"
      - "Purchase Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_order_date
        anchor: '(?i)\b(?:order\s+date|po\s+date|issue\s+date|date\s+issued|purchase\s+date)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.88
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: expected_delivery_date
