doc_type: purchase_order
db_table: proc.bp_purchase_order_stg
db_lines_table: proc.bp_po_line_items_stg

fields:
  - name: po_id
    type: string
    required: true
    db_column: po_id
    canonical_labels:
      - "Purchase Order Number"
      - "PO Number"
      - "PO No"
      - "PO #"
      - "Order Number"
      - "Purchase Order"
      - "Order No"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_po_number
        anchor: '(?i)\b(?:purchase\s+order\s+(?:number|no\.?)|po\s*(?:number|no\.?)|order\s+number|order\s+no\.?)\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.90
      - name: anchored_po_hash
        anchor: '(?i)\bpo\s*#\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      # "PURCHASE ORDER: 01-2024-001" without explicit Number/No keyword
      - name: bare_purchase_order_colon
        anchor: '(?i)\bpurchase\s+order\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.82
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_name
    type: string
    required: true
    db_column: supplier_name
    canonical_labels:
      - "Supplier"
      - "Vendor"
      - "From"
      - "Sold By"
      - "Seller"
      # On purchase orders the PO is issued TO the supplier — so the
      # "Recipient" / "Send To" / "To" block IS the supplier. Without
      # these labels the L3 judge guesses between two ORG candidates
      # (buyer vs supplier) and tends to pick the wrong one.
      - "Recipient"
      - "Send To"
      - "Ship To"
      - "To"
    confidence_threshold: 0.60
    patterns:
      # On a PO the addressee is the supplier. Markdown structure often
      # gives us ``## Recipient: ## <Supplier Name>`` or ``Send To: <ORG>``
      # with optional pipe/whitespace padding from table layout. Capture
      # the WHOLE line that follows the label — the previous lazy
      # ``{2,80}?`` with optional suffix returned 3-char prefixes like
      # "Thr" / "Gom" because the non-greedy quantifier prefers the
      # shortest legal match and the suffix group is optional. Greedy
      # ``[^\n#|]{3,80}`` bounds the capture at end-of-line or markdown
      # delimiter, so we get the full company line.
      - name: po_recipient_supplier
        anchor: '(?i)#*\s*(?:recipient|send\s+to|ship\s+to|sold\s+to)\s*[:#\-]*\s*#*\s*'
        value: '([A-Z][^\n#|]{2,80}?)\s*(?:\n|$|\s*#|\s*\|)'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.78
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "ORG"
    invariants: []

  - name: buyer_id
    type: string
    required: false
    db_column: buyer_id
    canonical_labels:
      - "Bill To"
      - "Ship To"
      - "Customer"
      - "Buyer"
      - "Ordered By"
      - "Deliver To"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

