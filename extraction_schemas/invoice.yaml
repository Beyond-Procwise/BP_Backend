  - name: invoice_total_incl_tax
    type: money
    required: false
    db_column: invoice_total_incl_tax
    canonical_labels:
      - "Total Amount"
      - "Grand Total"
      - "Invoice Total"
      - "Amount Due"
      - "Total Incl. Tax"
      - "Total Amount ($)"
      - "Total ($)"
      - "Total Payable"
      - "Total"
    confidence_threshold: 0.65
    patterns:
      - name: grand_total_incl
        anchor: '(?i)\bgrand[\s\-]+total\s*[:\-]?\s*[|]?\s*'
        value: '[ВЈ$вӮ¬ВҘ]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.92
      - name: total_amount_payable
        anchor: '(?i)\btotal\s+amount\s+payable\s*[:\-]?\s*[|]?\s*'
        value: '[ВЈ$вӮ¬ВҘ]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.90
      - name: total_incl_tax
        anchor: '(?i)\btotal\s+incl\.?\s+tax\s*[:\-]?\s*[|]?\s*'
        value: '[ВЈ$вӮ¬ВҘ]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.88
      - name: invoice_total_label
