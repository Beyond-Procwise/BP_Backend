doc_type: invoice
db_table: proc.bp_invoice_stg
db_lines_table: proc.bp_invoice_line_items_stg

fields:
  - name: invoice_id
    type: string
    required: true
    db_column: invoice_id
    canonical_labels:
      - "Invoice Number"
      - "Invoice No"
      - "Invoice No."
      - "Invoice #"
      - "Inv No"
      - "Document Number"
      - "Document No"
      - "Document No."
    confidence_threshold: 0.70
    patterns:
      # Procurement invoice IDs ALWAYS contain at least one digit. Requiring
      # \d in the value class rules out detached-layout false matches like
      # "Invoice Number:\n\nInvoice Date:" capturing "Invoice".
      - name: anchored_invoice_no
        anchor: '(?i)\binvoice\s*(?:number|no\.?)\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.88
      - name: anchored_invoice_hash
        anchor: '(?i)\binvoice\s*#\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.84
      - name: anchored_document_no
        anchor: '(?i)\bdocument\s*(?:number|no\.?)\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.78
      - name: inv_prefixed_id
        anchor: '(?<![A-Z])(?:INV|INVOICE)[\-\:#]'
        value: '([A-Z]{0,4}[0-9]{4,12})'
        max_span_after_anchor_chars: 20
        prior_confidence: 0.72
      # Spaceless OCR variants (real-world: "InvoiceNo: INV600253",
      # "Invoice  No.123"). Same value class as the canonical form.
      - name: spaceless_invoice_no
        anchor: '(?i)\binvoice\s*no\.?\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.86
      # "INV NO. 039467 / 30 MARCH. 2024" вҖ” bare "NO." or "NO:" right after
      # an INV/INVOICE token, without "Invoice Number" wording. The window
      # is wide enough to span docling's markdown-table separators between
      # the label row and the value row.
      - name: invoice_no_short
        anchor: '(?i)\binv\s*(?:no|#|number)?\.?\s*[:\-]?\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.68
      # Last resort: a token of the form INV/INV-/INVNNNN at any position.
      # Loose enough to catch headings, tight enough (вүҘ4 digits) to avoid
      # picking up things like "INV2" line numbers.
      - name: inv_id_heading
        anchor: ''
        value: '\b(INV[A-Z]{0,3}[\-\.]?\d{4,12})\b'
        max_span_after_anchor_chars: 0
        prior_confidence: 0.62
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_name
    type: string
    required: false
    db_column: null
    resolves_to_db_column: supplier_id
    canonical_labels:
      - "Supplier"
      - "Vendor"
      - "Billed From"
      - "Seller"
      - "Store Name"
      - "Company Name"
      - "Issued By"
      - "Invoice From"
      - "Remit To"
      - "Service Provider"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_supplier
        anchor: '(?im)^\s*(?:supplier|vendor|billed\s+from|seller|invoice\s+from|remit\s+to)\s*[:\-]\s*'
        value: '([A-Z][^\n]{2,80})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.78
      - name: anchored_from
        anchor: '(?im)^\s*from\s*[:\-]\s*'
        value: '([A-Z][^\n]{2,80})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.72
      # Masthead pattern: docling renders an invoice header as
      # ``## INVOICE Duncan LLC`` вҖ” the company directly after the
      # word INVOICE in a heading line is the supplier (the issuer).
      # Value bounded to end-of-line and required to end in a business
      # suffix to avoid grabbing a buyer or service description.
      - name: masthead_invoice_heading
        anchor: '(?im)^#*\s*invoice\s+'
        value: '([A-Z][A-Za-z0-9 &,\.\-]{2,60}\s+(?:LLC|Ltd|Limited|Inc|Incorporated|Pvt|GmbH|Corp|Corporation|Co\.?|Company|Studios|Agency|Group|Solutions|Services|Holdings|Enterprises?|LLP|PLC))\b'
        max_span_after_anchor_chars: 90
        prior_confidence: 0.82
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "ORG"
    invariants: []

  - name: po_id
    type: string
    required: false
    db_column: po_id
    canonical_labels:
      - "Purchase Order"
      - "PO Number"
      - "PO No"
      - "PO No."
      - "Purchase Order Number"
      - "Purchase Order No"
      - "Purchase Order No."
      - "Order Reference"
      - "PO Ref"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_po_number
        anchor: '(?i)\b(?:purchase\s+order\s+(?:number|no\.?)|po\s*(?:number|no\.?|#)|order\s+reference)\s*[:\-]\s*'
        value: '([A-Z0-9][A-Z0-9\-\/\.]{2,30})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.86
      - name: bare_po_number
        anchor: '(?i)\bpo\s*number\s*[:\-]?\s*'
        value: '([A-Z0-9][A-Z0-9\-\/\.]{2,30})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.78
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: buyer_id
    type: string
    required: false
    db_column: buyer_id
    canonical_labels:
