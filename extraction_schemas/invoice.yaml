  - name: requested_date
    type: iso_date
    required: false
    db_column: requested_date
    canonical_labels:
      - "Request Date"
      - "Requested Date"
      - "Order Date"
      - "Requisition Date"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: invoice_date
    type: iso_date
    required: true
    db_column: invoice_date
    canonical_labels:
      - "Invoice Date"
      - "Date of Invoice"
      - "Billing Date"
      - "Issue Date"
      - "Date Issued"
      - "Order Date"
      - "Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_invoice_date
        anchor: '(?i)\b(?:invoice\s+date|date\s+of\s+invoice|billing\s+date|issue\s+date|date\s+issued)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.88
      - name: anchored_document_date
        anchor: '(?i)\b(?:document\s+date|date)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.72
      # Spaceless OCR ("InvoiceDate:") and "Date:" inside a table cell where
      # the colon is line-separated from the value.
      - name: spaceless_invoice_date
        anchor: '(?i)\binvoice\s*date\s*[:\-]?[\s|]*'
        value: '([A-Za-z]{3,9}\s*\d{1,2}\s*,\s*\d{4}|\d{1,2}\s*[A-Za-z]{3,9}\s*\d{2,4}|\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{2,4})'
        max_span_after_anchor_chars: 80
        prior_confidence: 0.78
      # "INV NO. X / 30 MARCH. 2024" вҖ” date appearing after a "/" separator
      # following an invoice number. Common in single-line footers.
      - name: invoice_no_slash_date
        anchor: '(?i)\binv\s*no\.?\s*[:\-]?\s*[A-Z0-9\-\/]+\s*\/\s*'
        value: '(\d{1,2}\s*[A-Za-z]{3,9}[\.,]?\s*\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2}[,\.]?\s+\d{4})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.74
      # Letter-spaced docling layout: "INVOICE NO: 132548\n\n1st Oct, 2024"
      # вҖ” the date is immediately after the invoice ID with no "Date:" label.
      # Window large enough to span markdown row separators (typical: 10-60
      # chars). Value class requires a month NAME to keep noise like
      # "15 cm x 19" out.
      - name: date_after_invoice_id
        anchor: '(?i)\binvoice\s*(?:number|no\.?|#)\s*[:\-]?\s*[A-Z0-9\-\/]+\s*'
        value: '(\d{1,2}(?:st|nd|rd|th)?\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[,\.]?\s+\d{2,4}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2}(?:st|nd|rd|th)?[,\.]?\s+\d{2,4})'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.72
      # Bare ordinal date appearing as a heading line ("1st Oct, 2024" or
      # "Oct 1st, 2024"). Last resort вҖ” month NAME required.
      - name: ordinal_month_date
        anchor: ''
        value: '\b(\d{1,2}(?:st|nd|rd|th)?\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[,\.]?\s+\d{2,4})\b'
        max_span_after_anchor_chars: 0
        prior_confidence: 0.60
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: due_date
    type: iso_date
    required: false
    db_column: due_date
    canonical_labels:
      - "Due Date"
      - "Payment Due"
      - "Pay By"
      - "Payment Due Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_due_date
        anchor: '(?i)\b(?:due\s+date|payment\s+due(?:\s+date)?|pay\s+by)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.86
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: invoice_paid_date
    type: iso_date
    required: false
    db_column: invoice_paid_date
    canonical_labels:
