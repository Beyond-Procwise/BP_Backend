  - name: payment_terms
    type: string
    required: false
    db_column: payment_terms
    canonical_labels:
      - "Payment Terms"
      - "Terms"
      - "Net Terms"
      - "Terms of Payment"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: currency
    type: currency
    required: true
    db_column: currency
    canonical_labels:
      - "Currency"
      - "CCY"
      - "Invoice Currency"
      - "Billing Currency"
    confidence_threshold: 0.55
    patterns:
      - name: anchored_currency_iso
        anchor: '(?i)\b(?:currency|ccy|invoice\s+currency|billing\s+currency)\s*[:\-]\s*'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.92
      - name: iso_code_in_text
        anchor: '(?:^|\n|\s)'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.70
      - name: pound_symbol
        anchor: '(?:^|\s)\(?'
        value: '(£)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: euro_symbol
        anchor: '(?:^|\s)\(?'
        value: '(€)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: dollar_symbol
        anchor: '(?:^|\s)\(?'
        value: '(\$)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.58
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: invoice_amount
    type: money
    required: true
    db_column: invoice_amount
    canonical_labels:
      - "Subtotal"
      - "Sub Total"
      - "Sub-total"
      - "Net Amount"
      - "Invoice Amount"
      - "Amount Before Tax"
      - "Amount Due (Excl. Tax)"
      - "Subtotal ($)"
      - "Total Before Tax"
      - "Net Total"
    confidence_threshold: 0.70
    patterns:
      # Highest-prior: very specific labels for the final payable/grand amount
      - name: grand_total
        anchor: '(?i)\bgrand\s+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.90
      - name: total_amount_payable
        anchor: '(?i)\btotal\s+amount\s+payable\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.89
      # "Amount Due" is unambiguous gross when no down-payment line follows;
      # in docs with down-payments / partial payments it equals the net balance,
      # which is NOT invoice_amount. We split it lower than total_sale.
      - name: anchored_subtotal
        anchor: '(?i)\b(?:sub\s*-?\s*total|net\s+amount|amount\s+before\s+tax|net\s+total)\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.87
      - name: total_sale_or_contract
        anchor: '(?i)\btotal\s+(?:sale\s+price|contract\s+value)\s*[:\-]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.86
      - name: anchored_invoice_amount
        anchor: '(?i)\binvoice\s+amount\s*[:\-]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.84
      - name: amount_due
        anchor: '(?i)\bamount\s+due\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.80
      - name: balance_due
        anchor: '(?i)\bbalance\s+due\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.75
      # Lowest-prior: bareword "Total: $X" — requires currency symbol immediately
      # before the value to avoid line-total false matches in tables.
      - name: total_with_currency
        anchor: '(?i)(?<!grand\s)(?<!\bsub\s)(?<!\bsub-)\btotal\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.78
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - subtotal_closure

