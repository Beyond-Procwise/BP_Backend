doc_type: invoice
db_table: proc.bp_invoice_stg
db_lines_table: proc.bp_invoice_line_items_stg

fields:
  - name: invoice_id
    type: string
    required: true
    db_column: invoice_id
    canonical_labels:
      - "Invoice Number"
      - "Invoice No"
      - "Invoice No."
      - "Invoice #"
      - "Inv No"
      - "Document Number"
      - "Document No"
      - "Document No."
    confidence_threshold: 0.70
    patterns:
      # Mandatory separator after the label avoids markdown-header false matches
      # like "## INVOICE\n\n## VENDOR" where # would otherwise satisfy the alt.
      - name: anchored_invoice_no
        anchor: '(?i)\binvoice\s*(?:number|no\.?)\s*[:\-]\s*'
        value: '([A-Z0-9][A-Z0-9\-\/\.]{2,30})'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.88
      - name: anchored_invoice_hash
        anchor: '(?i)\binvoice\s*#\s*'
        value: '([A-Z0-9][A-Z0-9\-\/\.]{2,30})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.84
      - name: anchored_document_no
        anchor: '(?i)\bdocument\s*(?:number|no\.?)\s*[:\-]\s*'
        value: '([A-Z0-9][A-Z0-9\-\/\.]{2,30})'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.78
      - name: inv_prefixed_id
        anchor: '(?<![A-Z])(?:INV|INVOICE)[\-\:#]'
        value: '([A-Z]{0,4}[0-9]{4,12})'
        max_span_after_anchor_chars: 20
        prior_confidence: 0.72
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_name
    type: string
    required: false
    db_column: null
    resolves_to_db_column: supplier_id
    canonical_labels:
      - "Supplier"
      - "Vendor"
      - "Billed From"
      - "Seller"
      - "Store Name"
      - "Company Name"
      - "Issued By"
      - "Invoice From"
      - "Remit To"
      - "Service Provider"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_supplier
        anchor: '(?im)^\s*(?:supplier|vendor|billed\s+from|seller|invoice\s+from|remit\s+to)\s*[:\-]\s*'
        value: '([A-Z][^\n]{2,80})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.78
      - name: anchored_from
        anchor: '(?im)^\s*from\s*[:\-]\s*'
        value: '([A-Z][^\n]{2,80})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.72
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "ORG"
    invariants: []

  - name: po_id
    type: string
    required: false
    db_column: po_id
    canonical_labels:
      - "Purchase Order"
      - "PO Number"
      - "PO No"
      - "PO No."
      - "Purchase Order Number"
      - "Purchase Order No"
      - "Purchase Order No."
      - "Order Reference"
      - "PO Ref"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: buyer_id
    type: string
    required: false
    db_column: buyer_id
    canonical_labels:
      - "Bill To"
      - "Invoice To"
      - "Customer"
      - "Buyer"
      - "Client"
      - "Billed To"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "ORG"
    invariants: []

  - name: requested_by
    type: string
    required: false
    db_column: requested_by
    canonical_labels:
      - "Requested By"
      - "Requestor"
      - "Raised By"
      - "Ordered By"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "PERSON"
    invariants: []

  - name: requested_date
    type: iso_date
    required: false
    db_column: requested_date
    canonical_labels:
      - "Request Date"
      - "Requested Date"
      - "Order Date"
      - "Requisition Date"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: invoice_date
    type: iso_date
    required: true
    db_column: invoice_date
    canonical_labels:
      - "Invoice Date"
      - "Date of Invoice"
      - "Billing Date"
      - "Issue Date"
      - "Date Issued"
      - "Order Date"
      - "Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_invoice_date
        anchor: '(?i)\b(?:invoice\s+date|date\s+of\s+invoice|billing\s+date|issue\s+date|date\s+issued)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.88
      - name: anchored_document_date
        anchor: '(?i)\b(?:document\s+date|date)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.72
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: due_date
    type: iso_date
    required: false
    db_column: due_date
    canonical_labels:
      - "Due Date"
      - "Payment Due"
      - "Pay By"
      - "Payment Due Date"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
