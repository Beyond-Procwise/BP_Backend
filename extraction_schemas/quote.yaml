    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: quote_date
    type: iso_date
    required: true
    db_column: quote_date
    canonical_labels:
      - "Quote Date"
      - "Date"
      - "Quotation Date"
      - "Issue Date"
      - "Date Issued"
      - "Date of Quote"
      - "Prepared Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_quote_date
        anchor: '(?i)\b(?:quot(?:e|ation)\s+date|date\s+of\s+quot(?:e|ation)|issue\s+date|date\s+issued|prepared\s+date)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}(?:st|nd|rd|th)?[\-\s][A-Za-z]{3,9}[\-\s,]?\s*\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2}(?:st|nd|rd|th)?,?\s+\d{4})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.88
      # Bare "Date:" anchor — invoice.yaml has this; quote docs use the same
      # pattern. Lower prior so the labelled forms above win when present.
      - name: bare_date_label
        anchor: '(?i)\bdate\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}(?:st|nd|rd|th)?[\-\s][A-Za-z]{3,9}[\-\s,]?\s*\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2}(?:st|nd|rd|th)?,?\s+\d{4})'
        max_span_after_anchor_chars: 80
        prior_confidence: 0.70
      # "INV NO. X / 21 FEBRUARY. 2024" — date appearing after a "/"
      # separator following an invoice-like ID in single-line footers
      # (VALUED MERCHANT pattern). Period after the month is tolerated.
      - name: id_slash_date
        anchor: '(?i)\b(?:inv|invoice|quote|quot|po)\s*no\.?\s*[:\-]?\s*[A-Z0-9\-\/]+\s*\/\s*'
        value: '(\d{1,2}\s*[A-Za-z]{3,9}[\.,]?\s*\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2}[,\.]?\s+\d{4})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.74
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: validity_date
    type: iso_date
    required: false
    db_column: validity_date
    canonical_labels:
      - "Valid Until"
      - "Validity Date"
      - "Quote Valid Until"
      - "Valid Through"
      - "Expiry Date"
      - "Expires On"
      - "Offer Valid Until"
      - "Quotation Valid Until"
      - "Validity Period"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: po_id
    type: string
    required: false
    db_column: po_id
    canonical_labels:
      - "Purchase Order"
      - "PO Number"
      - "PO No"
      - "Order Reference"
      - "PO Ref"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: currency
    type: currency
    required: true
    db_column: currency
    canonical_labels:
      - "Currency"
      - "CCY"
      - "Invoice Currency"
      - "Quote Currency"
    confidence_threshold: 0.55
    patterns:
      - name: anchored_currency_iso
        anchor: '(?i)\b(?:currency|ccy)\s*[:\-]\s*'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.92
      - name: iso_in_text
        anchor: '(?:^|\n|\s)'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.70
      - name: pound_symbol
        anchor: '(?:^|\s)'
        value: '(£)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: dollar_symbol
        anchor: '(?:^|\s)'
        value: '(\$)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.58
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: total_amount
    type: money
    required: false
    db_column: total_amount
    canonical_labels:
      - "Subtotal"
      - "Sub Total"
      - "Sub-total"
      - "Net Amount"
      - "Net Total"
      - "Amount Before Tax"
      - "Total Before Tax"
      - "Total (Excl. Tax)"
      - "Total Materials"
      - "Total Services"
    confidence_threshold: 0.65
    patterns:
      # Hyphenated "Grand-Total" appears in some PDF templates (VALUED
       # MERCHANT etc.) — \s\-? lets the anchor span both.
      - name: grand_total
        anchor: '(?i)\bgrand[\s\-]+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.90
      - name: anchored_subtotal
        anchor: '(?i)\b(?:sub\s*-?\s*total|net\s+amount|net\s+total|amount\s+before\s+tax|total\s+before\s+tax)\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      - name: quote_total
        anchor: '(?i)\b(?:quote\s+total|quotation\s+total|total\s+(?:quote|quotation))\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.86
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - subtotal_closure

  - name: tax_percent
    type: decimal
    required: false
    db_column: tax_percent
