doc_type: quote
db_table: proc.bp_quote_stg
db_lines_table: proc.bp_quote_line_items_stg

fields:
  - name: quote_id
    type: string
    required: true
    db_column: quote_id
    canonical_labels:
      - "Quote Number"
      - "Quote No"
      - "Quote #"
      - "Quotation Number"
      - "Quotation No"
      - "Quotation #"
      - "Reference No"
      - "Reference Number"
      - "Ref No"
      - "RFQ Reference"
      - "RFQ No"
      - "Document Number"
      - "Quote Reference"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_quote_no
        anchor: '(?i)\b(?:quot(?:e|ation)\s*(?:number|no\.?)|quot(?:e|ation)\s*reference|reference\s*(?:number|no\.?)|rfq\s*(?:reference|no\.?)|document\s*(?:number|no\.?))\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.90
      - name: quote_hash
        anchor: '(?i)\bquot(?:e|ation)\s*#\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      - name: bare_quote_colon
        anchor: '(?i)\bquot(?:e|ation)\s*[:\-]\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.78
      # Spaceless OCR ("QuoteNo:") and "Quote Number Date Issued : ... QUTxxxx"
      # cases where the label and value are split across columns. Wide window
      # for the column-split form where the value sits 50-90 chars below
      # the "Quote Number" label.
      - name: spaceless_quote_no
        anchor: '(?i)\bquote\s*no\.?\s*[:\-]?\s*'
        value: '([A-Z][A-Z0-9\-\/\.]{2,30}|\d{4,12}[A-Z0-9\-\/\.]{0,20})'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.74
      # Column-split layout: "Quote Number\nDate Issued :\n<date>\nQUT30746"
      # — the value sits a full block below the "Quote Number" label and
      # the only token of the form QU* nearby is the quote id itself.
      - name: quote_number_split_layout
        anchor: '(?i)\bquote\s+number\b'
        value: '\b(QU(?:T|OT|OTE|TE)?[\-\.]?\d{2,}[A-Z0-9\-\/]{0,30})\b'
        max_span_after_anchor_chars: 120
        prior_confidence: 0.72
      # Bare QUT/QUOTE/QT-prefixed identifier appearing as a heading or in a
      # detached column. Tight enough (≥3 digits or a hyphenated form) to
      # avoid grabbing the literal word "QUOTE" in headings.
      - name: qut_id_heading
        anchor: ''
        value: '\b(QU(?:T|OT|OTE)[\-\.]?\d{2,}[A-Z0-9\-\/]{0,30})\b'
        max_span_after_anchor_chars: 0
        prior_confidence: 0.66
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  # supplier_id is populated by the context_layer (raw → stg synthesis)
  # using the masthead/heading company, then resolved against bp_supplier.
  # Direct extractors disabled because they routinely promoted layout
  # noise ("QTY", "Subtotal", product names, ink colours) into this
  # column. The context_layer disambiguates issuer vs recipient using
  # the full document text.
  - name: supplier_id
    type: string
    required: false
    db_column: supplier_id
    resolves_to_db_column: supplier_id
    canonical_labels:
      - "Supplier"
      - "Vendor"
      - "From"
      - "Quoted By"
      - "Seller"
      - "Issued By"
    extractors: []
    judge:
      tiebreaker: false
      grounded_last_resort: false
      ner_type_check: "none"
    invariants: []

  - name: buyer_id
    type: string
    required: false
    db_column: buyer_id
    canonical_labels:
      - "Bill To"
      - "Ship To"
      - "Customer"
      - "Buyer"
      - "Client"
      - "Quoted To"
      - "Attention"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_address
    type: string
    required: false
    db_column: supplier_address
    canonical_labels:
