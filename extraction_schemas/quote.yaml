doc_type: quote
db_table: proc.bp_quote_stg
db_lines_table: proc.bp_quote_line_items_stg

fields:
  - name: quote_id
    type: string
    required: true
    db_column: quote_id
    canonical_labels:
      - "Quote Number"
      - "Quote No"
      - "Quote #"
      - "Quotation Number"
      - "Quotation No"
      - "Quotation #"
      - "Reference No"
      - "Reference Number"
      - "Ref No"
      - "RFQ Reference"
      - "RFQ No"
      - "Document Number"
      - "Quote Reference"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_quote_no
        anchor: '(?i)\b(?:quot(?:e|ation)\s*(?:number|no\.?)|quot(?:e|ation)\s*reference|reference\s*(?:number|no\.?)|rfq\s*(?:reference|no\.?)|document\s*(?:number|no\.?))\s*[:\-]\s*'
        value: '([A-Z0-9]*\d[A-Z0-9\-\/\.]{0,30})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.90
      - name: quote_hash
        anchor: '(?i)\bquot(?:e|ation)\s*#\s*'
        value: '([A-Z0-9]*\d[A-Z0-9\-\/\.]{0,30})'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      - name: bare_quote_colon
        anchor: '(?i)\bquot(?:e|ation)\s*[:\-]\s*'
        value: '([A-Z0-9]*\d[A-Z0-9\-\/\.]{0,30})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.78
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_id
    type: string
    required: false
    db_column: supplier_id
    resolves_to_db_column: supplier_id
    canonical_labels:
      - "Supplier"
      - "Vendor"
      - "From"
      - "Quoted By"
      - "Seller"
      - "Issued By"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "ORG"
    invariants: []

  - name: buyer_id
    type: string
    required: false
    db_column: buyer_id
    canonical_labels:
      - "Bill To"
      - "Ship To"
      - "Customer"
      - "Buyer"
      - "Client"
      - "Quoted To"
      - "Attention"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: supplier_address
    type: string
    required: false
    db_column: supplier_address
    canonical_labels:
      - "Supplier Address"
      - "From Address"
      - "Vendor Address"
      - "Our Address"
      - "Remit To"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: buyer_address
    type: string
    required: false
    db_column: buyer_address
    canonical_labels:
      - "Bill To Address"
      - "Ship To Address"
      - "Customer Address"
      - "Delivery Address"
      - "Buyer Address"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: quote_date
    type: iso_date
    required: true
    db_column: quote_date
    canonical_labels:
      - "Quote Date"
      - "Date"
      - "Quotation Date"
      - "Issue Date"
      - "Date Issued"
      - "Date of Quote"
      - "Prepared Date"
    confidence_threshold: 0.65
    patterns:
      - name: anchored_quote_date
        anchor: '(?i)\b(?:quot(?:e|ation)\s+date|date\s+of\s+quot(?:e|ation)|issue\s+date|date\s+issued|prepared\s+date)\s*[:\-]\s*'
        value: '(\d{1,2}[/\-\.\s]\d{1,2}[/\-\.\s]\d{2,4}|\d{4}[/\-]\d{1,2}[/\-]\d{1,2}|\d{1,2}[\-\s][A-Za-z]{3,9}[\-\s]\d{2,4}|[A-Za-z]{3,9}\s+\d{1,2},?\s+\d{4})'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.88
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: validity_date
    type: iso_date
    required: false
    db_column: validity_date
    canonical_labels:
      - "Valid Until"
      - "Validity Date"
      - "Quote Valid Until"
      - "Valid Through"
      - "Expiry Date"
      - "Expires On"
      - "Offer Valid Until"
      - "Quotation Valid Until"
      - "Validity Period"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - date_sanity

  - name: po_id
    type: string
    required: false
    db_column: po_id
    canonical_labels:
      - "Purchase Order"
      - "PO Number"
      - "PO No"
      - "Order Reference"
      - "PO Ref"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: currency
    type: currency
    required: true
    db_column: currency
    canonical_labels:
      - "Currency"
      - "CCY"
      - "Invoice Currency"
      - "Quote Currency"
    confidence_threshold: 0.55
    patterns:
      - name: anchored_currency_iso
        anchor: '(?i)\b(?:currency|ccy)\s*[:\-]\s*'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.92
      - name: iso_in_text
        anchor: '(?:^|\n|\s)'
        value: '\b(USD|GBP|EUR|JPY|AUD|CAD|INR|SGD|HKD|CHF|NZD)\b'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.70
      - name: pound_symbol
        anchor: '(?:^|\s)'
        value: '(£)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.60
      - name: dollar_symbol
        anchor: '(?:^|\s)'
        value: '(\$)'
        max_span_after_anchor_chars: 5
        prior_confidence: 0.58
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants: []

  - name: total_amount
    type: money
    required: false
    db_column: total_amount
    canonical_labels:
      - "Subtotal"
      - "Sub Total"
      - "Sub-total"
      - "Net Amount"
      - "Net Total"
      - "Amount Before Tax"
      - "Total Before Tax"
      - "Total (Excl. Tax)"
      - "Total Materials"
      - "Total Services"
    confidence_threshold: 0.65
    patterns:
      - name: grand_total
        anchor: '(?i)\bgrand\s+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.90
      - name: anchored_subtotal
        anchor: '(?i)\b(?:sub\s*-?\s*total|net\s+amount|net\s+total|amount\s+before\s+tax|total\s+before\s+tax)\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.85
      - name: quote_total
        anchor: '(?i)\b(?:quote\s+total|quotation\s+total|total\s+(?:quote|quotation))\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]?\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 30
        prior_confidence: 0.86
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - subtotal_closure

  - name: tax_percent
    type: decimal
    required: false
    db_column: tax_percent
    canonical_labels:
      - "Tax Rate"
      - "VAT Rate"
      - "GST Rate"
      - "Tax %"
      - "Tax Percentage"
      - "GST %"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - tax_closure

  - name: tax_amount
    type: money
    required: false
    db_column: tax_amount
    canonical_labels:
      - "Tax Amount"
      - "VAT Amount"
      - "GST Amount"
      - "Tax"
      - "Tax Total"
      - "GST"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - tax_closure

  - name: total_amount_incl_tax
    type: money
    required: true
    db_column: total_amount_incl_tax
    canonical_labels:
      - "Total Amount"
      - "Grand Total"
      - "Quote Total"
      - "Total Incl. Tax"
      - "Total Incl Tax"
      - "Total (Incl. GST)"
      - "Total (Incl. Tax)"
      - "Amount Due"
      - "Total"
      - "Total Quoted"
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - tax_closure

  - name: country
    type: string
    required: false
    db_column: country
    canonical_labels:
      - "Country"
      - "Billing Country"
      - "Country of Origin"
      - "Supplier Country"
    extractors:
