      ner_type_check: "none"
    invariants: []

  - name: buyer_address
    type: string
    required: false
    db_column: buyer_address
    canonical_labels:
      - "Bill To Address"
      - "Ship To Address"
      - "Customer Address"
      - "Delivery Address"
      - "Buyer Address"
