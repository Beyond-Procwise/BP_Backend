  - name: total_amount_incl_tax
    type: money
    required: true
    db_column: total_amount_incl_tax
    canonical_labels:
      - "Total Amount"
      - "Grand Total"
      - "Quote Total"
      - "Total Incl. Tax"
      - "Total Incl Tax"
      - "Total (Incl. GST)"
      - "Total (Incl. Tax)"
      - "Amount Due"
      - "Total"
      - "Total Quoted"
    confidence_threshold: 0.65
    # Mirrors invoice.invoice_total_incl_tax: deterministic patterns first,
    # qwen_vlm only as a fallback. Empty patterns block was leaving every
    # quote without this field unless Qwen happened to respond cleanly.
    patterns:
      - name: grand_total_incl
        anchor: '(?i)\bgrand[\s\-]+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 80
        prior_confidence: 0.92
      - name: total_amount_due
        anchor: '(?i)\btotal\s+amount\s+due\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 80
        prior_confidence: 0.90
      - name: quote_total_incl
        anchor: '(?i)\b(?:quote|quotation)\s+total\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.88
      - name: total_incl_tax_label
        anchor: '(?i)\btotal\s*\(?\s*incl\.?\s*(?:of\s+)?(?:tax|gst|vat)\s*\)?\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.86
      - name: total_payable
        anchor: '(?i)\btotal\s+payable\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 60
        prior_confidence: 0.84
      # Bare "Total" line with currency on next column (markdown-table form
      # "| Total       | £1,036.98 |"). Currency symbol required so we
      # don't grab line-totals.
      - name: bare_total_with_currency
        anchor: '(?i)(?<!grand[\s\-])(?<!sub[\s\-])(?<!sub-)\btotal\s*[:\-]?\s*[|]?\s*'
        value: '[£$€¥]\s*([0-9]+(?:[,\.][0-9]{3})*(?:\.[0-9]{2})?)'
        max_span_after_anchor_chars: 40
        prior_confidence: 0.74
    extractors:
      - qwen_vlm
    judge:
      tiebreaker: true
      grounded_last_resort: true
      ner_type_check: "none"
    invariants:
      - tax_closure

